- pr: 1784
  comment_id: 3140390701
  author: paul-nechifor
  file: dimos/core/global_config.py
  line: 44
  problem: "It's kinda odd to have both a constant and a global config value? Which one are people supposed to use? But what is this for? Isn't it controlled by passing --viewer=rerun-web?"
  solution: "The constant RERUN_ENABLE_WEB serves as the default value for the global_config.rerun_web field. Users control it via global_config (env var or CLI). The constant exists so the default is defined in one place (visualization/constants.py). The --viewer=rerun-web flag and rerun_web are separate concerns: viewer selects the backend (rerun vs foxglove vs none), while rerun_web controls whether the web server is started alongside the native viewer. This is a design question for Jeff to clarify in code comments if needed."
  commit: null
